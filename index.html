<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  * {
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    overscroll-behavior: none;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1c1c1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(44, 44, 42, 0.78);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
  }
  .label {
    font-size: 12px;
    letter-spacing: 0.04em;
    color: #b4b2a9;
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  .title {
    font-size: 20px;
    font-weight: 500;
    color: #f1efe8;
    line-height: 1.4;
    margin: 0 0 6px;
  }
  .desc {
    font-size: 14px;
    color: #b4b2a9;
    line-height: 1.6;
    margin: 0 0 20px;
  }
  .cta {
    display: block;
    background: #f1efe8;
    color: #2c2c2a;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 16px;
    border-radius: 8px;
  }
  .cta:hover {
    background: #ffffff;
  }

  .ask {
    font-size: 13px;
    color: #b4b2a9;
    margin: 0 0 14px;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }
  button, .btn-nao-placeholder {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }
  button {
    font-family: inherit;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-sim {
    flex: 1;
    max-width: 160px;
    padding: 0 20px;
    font-weight: 700;
    color: #0a2b00;
    background: #3CFF3C;
    border: none;
    animation: pulseGlow 1.1s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% {
      box-shadow: 0 0 6px 1px rgba(60, 255, 60, 0.55);
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 30px 10px rgba(60, 255, 60, 1);
      transform: scale(1.04);
    }
  }
  /* Reserves the layout space so .btn-sim never reflows when .btn-nao leaves the flex flow */
  .btn-nao-placeholder {
    flex: 1;
    max-width: 160px;
    visibility: hidden;
    border: 1px solid transparent;
  }
  .btn-nao {
    position: fixed;
    padding: 0 20px;
    font-weight: 500;
    color: #000000;
    background: #FF3131;
    border: 1px solid #D92626;
    z-index: 9999;
    margin: 0;
    transition: left 0.12s ease, top 0.12s ease;
  }

  .sad-rain {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .sad-rain span {
    position: absolute;
    top: -60px;
    line-height: 1;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    will-change: transform;
  }
  @keyframes fall {
    from { transform: translateY(0); }
    to { transform: translateY(calc(100vh + 120px)); }
  }

  .heart-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    overflow: hidden;
    background: #1c1c1a;
    opacity: 0;
    z-index: 10000;
    pointer-events: none;
    transition: opacity 0.6s ease;
    padding: 24px;
    box-sizing: border-box;
    text-align: center;
  }
  .heart-overlay.show {
    display: flex;
  }
  .heart-overlay.grow {
    opacity: 1;
  }
  .heart-emoji {
    display: block;
    font-size: 8vmin;
    line-height: 1;
    transition: font-size 1.3s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .heart-overlay.grow .heart-emoji {
    font-size: 55vmin;
  }
  .heart-actions {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: stretch;
    width: 100%;
    max-width: 280px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .heart-actions.show {
    opacity: 1;
    pointer-events: auto;
  }
  .cta-auth {
    display: block;
    background: #3CFF3C;
    color: #0a2b00;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 16px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }
  .make-your-own {
    display: block;
    margin-top: 16px;
    font-size: 12px;
    color: #7d7b73;
    text-decoration: none;
  }
  .make-your-own:hover {
    color: #b4b2a9;
  }
</style>
</head>
<body>
  <div id="sadRain" class="sad-rain" aria-hidden="true"></div>

  <div class="card">
    <svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="Carinha triste" style="margin:0 auto 1.25rem;display:block;">
      <title>Carinha triste</title>
      <circle cx="70" cy="70" r="62" fill="#FAC775"/>
      <circle cx="70" cy="70" r="62" fill="none" stroke="#854F0B" stroke-width="1.5"/>
      <circle cx="48" cy="60" r="7" fill="#412402"/>
      <circle cx="92" cy="60" r="7" fill="#412402"/>
      <path d="M40 96 Q70 76 100 96" fill="none" stroke="#412402" stroke-width="4" stroke-linecap="round"/>
      <path d="M38 47 Q48 38 58 46" fill="none" stroke="#412402" stroke-width="3" stroke-linecap="round"/>
      <path d="M82 46 Q92 38 102 47" fill="none" stroke="#412402" stroke-width="3" stroke-linecap="round"/>
      <path d="M40 68 q-3 6 0 12" fill="none" stroke="#378ADD" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 68 q3 6 0 12" fill="none" stroke="#378ADD" stroke-width="3" stroke-linecap="round"/>
    </svg>

    <p class="label" id="labelText">Apelo do Lucas</p>
    <p class="title" id="titleText">Posso comprar a Bambu Lab A1 mini?</p>
    <p class="desc" id="descText">Prometo que é só pra prototipar coisas da Connex.ai... e imprimir uns brinquedinhos pro Anthony Gabriel também.</p>

    <div id="question">
      <p class="ask">Vamos lá, é só clicar em "sim" 🙏</p>
      <div class="btn-row">
        <button id="simBtn" class="btn-sim" type="button">Sim</button>
        <span id="naoPlaceholder" class="btn-nao-placeholder" aria-hidden="true"></span>
      </div>
    </div>

    <a class="make-your-own" href="lp.html">Criar meu próprio link →</a>
  </div>

  <button id="naoBtn" class="btn-nao" type="button">Não</button>

  <div id="heartOverlay" class="heart-overlay" aria-hidden="true">
    <span class="heart-emoji">❤️</span>
    <div id="heartActions" class="heart-actions">
      <a id="ctaBtn" class="cta" href="https://www.mercadolivre.com.br/impressora-3d-bambu-lab-a1-mini-combo-a1mc/p/MLB64966578?pdp_filters=item_id%3AMLB4847287867&matt_tool=38524122&ua=AMCthuJReRunCWfYvYLJ0TNkobr9Zu-pPAkvVk4mmWwxrGY#origin=whatsapp&sid=whatsapp&wid=MLB4847287867" target="_blank" rel="noopener">Dar de presente 🎁</a>
      <button id="authBtn" class="cta-auth" type="button">Autorizar ❤️</button>
    </div>
  </div>

  <script>
    var naoBtn = document.getElementById('naoBtn');
    var naoPlaceholder = document.getElementById('naoPlaceholder');
    var simBtn = document.getElementById('simBtn');
    var question = document.getElementById('question');
    var ctaBtn = document.getElementById('ctaBtn');
    var titleText = document.getElementById('titleText');
    var descText = document.getElementById('descText');
    var labelText = document.getElementById('labelText');

    var whatsappPhone = '5511985104526';
    var whatsappMessage = 'Compra autorizada pela minha grandiosa, plena e doce esposa, linda e maravilhosa! 😍❤️';

    (function applyCustomConfig() {
      var params = new URLSearchParams(location.search);
      if (params.has('n')) labelText.textContent = params.get('n');
      if (params.has('t')) titleText.textContent = params.get('t');
      if (params.has('d')) descText.textContent = params.get('d');
      if (params.has('pu') && /^https?:\/\//i.test(params.get('pu'))) {
        ctaBtn.href = params.get('pu');
      }
      if (params.has('wn')) whatsappPhone = params.get('wn').replace(/\D/g, '');
      if (params.has('wm')) whatsappMessage = params.get('wm');

      var buttons = params.get('bt');
      if (buttons === 'gift') {
        document.getElementById('authBtn').style.display = 'none';
      } else if (buttons === 'auth') {
        ctaBtn.style.display = 'none';
      }
    })();

    function placeNaoButton() {
      var r = naoPlaceholder.getBoundingClientRect();
      naoBtn.style.width = r.width + 'px';
      naoBtn.style.height = r.height + 'px';
      naoBtn.style.left = r.left + 'px';
      naoBtn.style.top = r.top + 'px';
    }

    function moveNaoButton(e) {
      if (e) e.preventDefault();

      var rect = naoBtn.getBoundingClientRect();
      var margin = 12;
      var maxX = Math.max(margin, window.innerWidth - rect.width - margin);
      var maxY = Math.max(margin, window.innerHeight - rect.height - margin);

      var randX = margin + Math.random() * (maxX - margin);
      var randY = margin + Math.random() * (maxY - margin);

      naoBtn.style.left = randX + 'px';
      naoBtn.style.top = randY + 'px';
    }

    placeNaoButton();
    window.addEventListener('resize', placeNaoButton);

    var rain = document.getElementById('sadRain');

    function sadFaceSVG(size) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">' +
        '<circle cx="70" cy="70" r="62" fill="#FFC400"/>' +
        '<circle cx="70" cy="70" r="62" fill="none" stroke="#854F0B" stroke-width="1.5"/>' +
        '<circle cx="48" cy="60" r="7" fill="#412402"/>' +
        '<circle cx="92" cy="60" r="7" fill="#412402"/>' +
        '<path d="M40 96 Q70 76 100 96" fill="none" stroke="#412402" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M38 47 Q48 38 58 46" fill="none" stroke="#412402" stroke-width="3" stroke-linecap="round"/>' +
        '<path d="M82 46 Q92 38 102 47" fill="none" stroke="#412402" stroke-width="3" stroke-linecap="round"/>' +
        '<path d="M40 68 q-3 6 0 12" fill="none" stroke="#378ADD" stroke-width="3" stroke-linecap="round"/>' +
        '<path d="M100 68 q3 6 0 12" fill="none" stroke="#378ADD" stroke-width="3" stroke-linecap="round"/>' +
      '</svg>';
    }

    function spawnRain(kind, count, fresh) {
      rain.innerHTML = '';
      for (var i = 0; i < count; i++) {
        var span = document.createElement('span');
        var size = 14 + Math.random() * 22;
        if (kind === 'sad') {
          span.innerHTML = sadFaceSVG(Math.round(size));
        } else {
          span.textContent = kind;
          span.style.fontSize = size + 'px';
        }
        var duration = fresh ? (3 + Math.random() * 3) : (6 + Math.random() * 8);
        var delay = fresh ? Math.random() * 1.5 : Math.random() * -14;
        var opacity = 0.45 + Math.random() * 0.4;
        span.style.left = (Math.random() * 100) + 'vw';
        span.style.opacity = opacity;
        span.style.animationDuration = duration + 's';
        span.style.animationDelay = delay + 's';
        rain.appendChild(span);
      }
    }

    spawnRain('sad', 22, false);

    naoBtn.addEventListener('touchstart', moveNaoButton, { passive: false });
    naoBtn.addEventListener('pointerdown', moveNaoButton, { passive: false });
    naoBtn.addEventListener('mouseenter', moveNaoButton);
    naoBtn.addEventListener('click', function (e) {
      e.preventDefault();
      moveNaoButton();
    });

    var heartOverlay = document.getElementById('heartOverlay');
    var heartEmoji = heartOverlay.querySelector('.heart-emoji');
    var heartActions = document.getElementById('heartActions');
    var authBtn = document.getElementById('authBtn');

    simBtn.addEventListener('click', function () {
      question.style.display = 'none';
      naoBtn.style.display = 'none';

      heartOverlay.classList.add('show');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          heartOverlay.classList.add('grow');
        });
      });
    });

    heartEmoji.addEventListener('transitionend', function (e) {
      if (e.propertyName === 'font-size') {
        heartActions.classList.add('show');
      }
    });

    authBtn.addEventListener('click', function () {
      var waUrl = 'https://wa.me/' + whatsappPhone + '?text=' + encodeURIComponent(whatsappMessage);
      window.open(waUrl, '_blank', 'noopener');
    });
  </script>
</body>
</html>
